spring.application.name=backend

# Database (Supabase PostgreSQL)
# Prefer env vars in all environments. Example:
# SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:5432/<db>?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# For safety, validate schema in Supabase (create tables via SQL migrations / Supabase SQL editor).
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}

# CORS (comma-separated). Set this in prod to your Vercel domain, e.g. https://your-app.vercel.app
app.cors.allowed-origins=http://localhost:5173

spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}
